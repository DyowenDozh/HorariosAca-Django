{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HorariosAca</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

    <header id="main-navbar"></header>

    <main class="login-container">
        <form id="login-form" class="login-box">
            <h2 data-i18n="login_title">Login - HorariosAca</h2>

            <div class="input-group">
                <label for="email" data-i18n="label_user">Email</label>
                <input type="email" id="email" placeholder="example@email.com" required>
                <span id="email-error" class="error-msg"></span>
            </div>

            <div class="input-group">
                <label for="password" data-i18n="label_password">Password</label>
                <input type="password" id="password" placeholder="********" required>
                <span id="password-error" class="error-msg"></span>
            </div>

            <button type="submit" id="submitBtn" data-i18n="btn_login">Login</button>
            
            <div id="globalMessage"></div>
            
            <p>
                <span data-i18n="no_account">Don't have an account?</span> 
                <a href="/register/" data-i18n="link_register">Register</a>
            </p>
        </form>
    </main>

    <footer id="main-footer"></footer>

    <script src="{% static 'navbar.js' %}"></script>
    <script src="{% static 'footer.js' %}"></script>
    <script src="{% static 'login.js' %}"></script>
    <script src="{% static 'support.js' %}"></script>
    <script src="{% static 'translations.js' %}"></script>
    <script src="{% static 'language-switcher.js' %}"></script>
</body>
</html>
