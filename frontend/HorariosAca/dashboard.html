<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - HorariosAca</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <main class="internal-content">
        <header class="dashboard-header">
            <h1 data-i18n="dash_title">Schedule Management</h1>
             <!-- SELECTOR DE IDIOMA tuvo que ser anadido manualmente no como modal -->
            <div class="lang-selector">
                <button id="lang-switch" class="lang-btn">
                    🌐 <span id="current-lang-text">English</span>
                </button>
                <div id="lang-dropdown" class="dropdown-hidden">
                    <button onclick="setLanguage('en')">English</button>
                    <button onclick="setLanguage('es')">Español</button>
                </div>
            </div>
            <!-- SELECTOR DE IDIOMA tuvo que ser anadido manualmente no como modal -->
        </header>

        <section class="table-container">
            <div id="schedule-list-container">
            </div>
        </section>
        <!-- NO HAY BASE DE DATOS REAL, estos son DATOS EJEMPLO de un horario -->
        <div id="view-modal" class="modal-hidden">
            <div class="modal-content large">
                <div class="modal-header">
                    <h2 id="modal-title" data-i18n="modal_schedule_details">Schedule Details</h2>
                    <button id="close-view" onclick="closeModal()">&times;</button>
                </div>
                <div class="timetable-container">
                    <div class="timetable">
                        <div class="time-slot" data-i18n="time_label">Time</div>
                        <div class="timetable-header" data-i18n="day_mon">Mon</div>
                        <div class="timetable-header" data-i18n="day_tue">Tue</div>
                        <div class="timetable-header" data-i18n="day_wed">Wed</div>
                        <div class="timetable-header" data-i18n="day_thu">Thu</div>
                        <div class="timetable-header" data-i18n="day_fri">Fri</div>

                        <div class="time-slot">07:00</div>
                        <div class="cell"><div class="subject-card" data-i18n="math">Math</div></div>
                        <div class="cell"></div>
                        <div class="cell"><div class="subject-card" data-i18n="physics">Physics</div></div>
                        <div class="cell"></div>
                        <div class="cell"><div class="subject-card" data-i18n="history">History</div></div>
                    </div>
                </div>
            </div>
        </div>
         <!-- NO HAY BASE DE DATOS REAL, estos son DATOS EJEMPLO de un horario -->

        <button id="add-schedule-btn" data-i18n="btn_add_schedule" onclick="createNewSchedule()">+</button>
    </main>
    <!-- SCRIPTS MODULARES Y AUTENTICACION -->
    <footer id="main-footer"></footer>

    <script src="auth.js"></script>       
    <script src="sidebar.js"></script>    
    <script src="footer.js"></script>    
    <script src="support.js"></script>   

    <!-- SCRIPTS DE TRADUCCIÓN -->
    <script src="translations.js"></script>
    <script src="language-switcher.js"></script>
    <script src="schedules.js"></script>

    <!-- INICIALIZACIÓN DE IDIOMA -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem("preferred_lang") || 'en';
            applyTranslations(savedLang); 
        });
    </script>
</body>
</html>
